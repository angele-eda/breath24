<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b1020">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>4-2-6 호흡</title>
<style>
:root {
  --bg:#070911; --card:rgba(255,255,255,.075); --line:rgba(255,255,255,.15);
  --text:#f6f8ff; --muted:#aeb7ca; --accent:#bcd7ff;
}
* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html {
  scrollbar-width:none;
}
html::-webkit-scrollbar, body::-webkit-scrollbar {
  width:0; height:0; display:none;
}

html,body {
  margin:0;
  min-height:100%;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:radial-gradient(circle at top,#17243d 0%,#070911 52%,#03040a 100%);
  color:var(--text);
}
body {
  display:flex;
  align-items:flex-start;
  justify-content:center;
  padding:22px 12px max(14px,env(safe-area-inset-bottom));
  min-height:100svh;
  overflow-x:hidden;
}
.app {
  width:min(430px,100%);
  margin-top:0;
  padding:24px 22px 16px;
  border-radius:34px;
  background:linear-gradient(180deg,rgba(255,255,255,.095),rgba(255,255,255,.058));
  border:1px solid var(--line);
  box-shadow:0 24px 80px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.08);
  backdrop-filter:blur(22px) saturate(135%);
  -webkit-backdrop-filter:blur(22px) saturate(135%);
}
h1 {
  margin:0 0 8px;
  font-size:clamp(24px,6.2vw,30px);
  line-height:1.06;
  font-weight:800;
  letter-spacing:-.055em;
  color:rgba(246,248,255,.9);
}
.sub { margin:0; min-height:0; }
.circle {
  width:min(58vw,222px);
  height:min(58vw,222px);
  margin:34px auto 18px;
  border-radius:50%;
  display:grid;
  place-items:center;
  border:1px solid rgba(255,255,255,.16);
  background:radial-gradient(circle,rgba(201,220,255,.17),rgba(201,220,255,.04) 65%);
  box-shadow:0 0 60px rgba(120,170,255,.15), inset 0 0 45px rgba(255,255,255,.05), inset 0 1px 1px rgba(255,255,255,.07);
  transform:scale(.88);
  transition:transform 1.05s cubic-bezier(.2,.8,.2,1), box-shadow 1.05s ease;
}
.circle.inhale { transform:scale(1.05); }
.circle.hold { transform:scale(1.05); }
.circle.exhale { transform:scale(.82); }
.phase {
  font-size:clamp(28px,8vw,38px);
  font-weight:800;
  text-align:center;
  letter-spacing:-.045em;
}
.count {
  margin-top:10px;
  min-height:24px;
  font-size:26px;
  font-weight:560;
  line-height:1.05;
  text-align:center;
  letter-spacing:.14em;
  color:rgba(246,248,255,.68);
}
.hint {
  color:var(--muted);
  text-align:center;
  min-height:24px;
  margin:0 0 14px;
  font-size:15px;
  letter-spacing:-.02em;
}
.box,
.controls {
  background:rgba(255,255,255,.062);
  border:1px solid var(--line);
  border-radius:22px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.06);
}
.box { padding:14px; }
.topline {
  display:flex;
  justify-content:space-between;
  color:var(--muted);
  font-size:14px;
  margin-bottom:10px;
  font-weight:650;
}
.bar {
  height:10px;
  border-radius:999px;
  background:rgba(255,255,255,.08);
  overflow:hidden;
  box-shadow:inset 0 1px 2px rgba(0,0,0,.28);
}
.fill {
  width:0%;
  height:100%;
  background:linear-gradient(90deg,#e4efff,#8db9ff);
  border-radius:999px;
  box-shadow:0 0 18px rgba(141,185,255,.25);
}
.buttons {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:12px;
}
button {
  border:1px solid var(--line);
  border-radius:22px;
  padding:15px 12px;
  min-height:54px;
  background:rgba(255,255,255,.092);
  color:var(--text);
  font-size:17px;
  font-weight:800;
  letter-spacing:-.035em;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.07), 0 10px 24px rgba(0,0,0,.16);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
}
button:active { transform:scale(.985); opacity:.9; }
button.primary {
  background:linear-gradient(180deg,rgba(211,228,255,.25),rgba(185,214,255,.12));
  border-color:rgba(185,214,255,.34);
}
.settingsToggle {
  display:block;
  width:44px;
  height:38px;
  min-height:0;
  margin:12px 6px 0 auto;
  padding:0;
  border:0;
  border-radius:0;
  background:transparent;
  box-shadow:none;
  backdrop-filter:none;
  -webkit-backdrop-filter:none;
  color:rgba(246,248,255,.82);
  font-size:24px;
  font-weight:800;
  line-height:38px;
  text-align:center;
}
.settingsToggle:active {
  transform:scale(.94);
  opacity:.75;
}
.settingsPanel {
  display:grid;
  grid-template-rows:0fr;
  opacity:0;
  transform:translateY(-4px);
  transition:grid-template-rows .26s ease, opacity .2s ease, transform .26s ease;
}
.settingsPanel > * { overflow:hidden; }
.settingsPanel.open {
  grid-template-rows:1fr;
  opacity:1;
  transform:translateY(0);
}
.roundSelect {
  display:grid;
  grid-template-columns:76px 1fr;
  align-items:center;
  gap:10px;
  margin-bottom:13px;
  color:var(--text);
  font-size:14px;
  font-weight:800;
}
.roundBtns {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:6px;
  padding:4px;
  border-radius:18px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.08);
}
.roundBtn {
  min-height:40px;
  padding:9px 8px;
  border-radius:14px;
  font-size:14px;
  font-weight:800;
  background:transparent;
  color:var(--muted);
  border-color:transparent;
  box-shadow:none;
}
.roundBtn.active {
  color:var(--text);
  border-color:rgba(185,214,255,.3);
  background:linear-gradient(180deg,rgba(211,228,255,.22),rgba(185,214,255,.1));
  box-shadow:0 8px 18px rgba(0,0,0,.16), inset 0 1px 0 rgba(255,255,255,.08);
}
.controls {
  margin-top:12px;
  padding:14px;
}
.row {
  display:grid;
  grid-template-columns:62px 1fr 46px;
  align-items:center;
  gap:10px;
  font-size:14px;
  color:var(--muted);
}
.row + .row { margin-top:10px; }
.row label { color:var(--text); font-weight:800; }
.row span { text-align:right; font-size:13px; font-weight:650; }
input[type=range] {
  width:100%;
  accent-color:#9fc4ff;
}
.note {
  margin:14px 0 0;
  padding-top:12px;
  border-top:1px solid var(--line);
  color:rgba(174,183,202,.82);
  font-size:13px;
  line-height:1.45;
  text-align:center;
}
@media (max-height:740px) {
  body { padding-top:14px; }
  .app { padding:20px 20px 18px; border-radius:30px; }
  h1 { font-size:24px; }
  .circle { width:min(54vw,190px); height:min(54vw,190px); margin:22px auto 12px; }
  .hint { margin-bottom:10px; }
  button { min-height:50px; padding:13px 10px; }
}
</style>
</head>
<body>
<main class="app">
  <h1>고요 · 안정 · 회복</h1>
  <p class="sub"></p>

  <div id="circle" class="circle">
    <div>
      <div id="phase" class="phase">준비</div>
      <div id="count" class="count"> </div>
    </div>
  </div>

  <p id="hint" class="hint">소리만 따라가</p>

  <section class="box">
    <div class="topline">
      <span id="roundText">0 / 10회</span>
      <span id="stepText">대기 중</span>
    </div>
    <div class="bar"><div id="fill" class="fill"></div></div>
  </section>

  <section class="buttons">
    <button id="startBtn" class="primary">시작</button>
    <button id="stopBtn">멈춤</button>
  </section>

  <button id="settingsToggle" class="settingsToggle" aria-label="설정 열기">▼</button>

  <section id="settingsPanel" class="settingsPanel">
    <section class="controls">
      <div class="roundSelect">
        <label>호흡 횟수</label>
        <div class="roundBtns">
          <button type="button" class="roundBtn" data-rounds="5">5회</button>
          <button type="button" class="roundBtn active" data-rounds="10">10회</button>
          <button type="button" class="roundBtn" data-rounds="15">15회</button>
        </div>
      </div>
      <div class="row">
        <label>목소리</label>
        <input id="voiceVol" type="range" min="10" max="100" value="58">
        <span id="voiceText">58%</span>
      </div>
      <div class="row">
        <label>종소리</label>
        <input id="chimeVol" type="range" min="0" max="90" value="22">
        <span id="chimeText">22%</span>
      </div>
    </section>

    <section class="buttons">
      <button id="testBtn">음성 테스트</button>
      <button id="chimeToggleBtn">종소리 켜짐</button>
    </section>

    <p class="note">
      시작 안내 · 숫자 음성 · 완료 인사
    </p>
  </section>

<script>
const circle=document.getElementById('circle');
const phaseEl=document.getElementById('phase');
const countEl=document.getElementById('count');
const hintEl=document.getElementById('hint');
const roundText=document.getElementById('roundText');
const stepText=document.getElementById('stepText');
const fill=document.getElementById('fill');
const startBtn=document.getElementById('startBtn');
const stopBtn=document.getElementById('stopBtn');
const testBtn=document.getElementById('testBtn');
const settingsToggle=document.getElementById('settingsToggle');
const settingsPanel=document.getElementById('settingsPanel');
const roundBtns=[...document.querySelectorAll('.roundBtn')];
const voiceVol=document.getElementById('voiceVol');
const chimeVol=document.getElementById('chimeVol');
const voiceText=document.getElementById('voiceText');
const chimeText=document.getElementById('chimeText');
const chimeToggleBtn=document.getElementById('chimeToggleBtn');
const nums=[1,2,3,4,5,6].map(n=>document.getElementById('n'+n));
const introAudio=document.getElementById('introAudio');
const outroAudio=document.getElementById('outroAudio');

let running=false;
let testing=false;
let timer=null;
let chimeOn=true;
let audioCtx=null;

let totalRounds=10;
const countMs=1120;
const pauseMs=600;
const pattern=[
  {key:'inhale', label:'들이마셔', seconds:4, hint:'넷까지 부드럽게 들이마셔.'},
  {key:'hold', label:'멈춰', seconds:2, hint:'둘까지 가볍게 멈춰.'},
  {key:'exhale', label:'내쉬어', seconds:6, hint:'여섯까지 길게 내쉬어.'}
];

function sleep(ms) {
  return new Promise(resolve => timer=setTimeout(resolve, ms));
}

function dots(n) {
  return Array(n).fill('·').join(' ');
}

function stopAll() {
  nums.forEach(a=>{ try{ a.pause(); a.currentTime=0; }catch(e){} });
}

function stopGuideAudio() {
  [introAudio,outroAudio].forEach(a=>{ try{ a.pause(); a.currentTime=0; }catch(e){} });
}

function playGuideAudio(audio) {
  return new Promise(resolve=>{
    if(!audio) return resolve();
    try {
      audio.pause();
      audio.currentTime=0;
      audio.volume=Number(voiceVol.value)/100;
      audio.onended=()=>resolve();
      audio.onerror=()=>resolve();
      const p=audio.play();
      if(p && p.catch) p.catch(()=>resolve());
    } catch(e) {
      resolve();
    }
  });
}

function playNum(n) {
  stopAll();
  const a=nums[n-1];
  if(!a) return;
  a.volume=Number(voiceVol.value)/100;
  a.currentTime=0;
  a.play().catch(()=>{});
}

function softChime(kind='normal') {
  if(!chimeOn) return;
  const vol=Number(chimeVol.value)/1000;
  if(vol<=0) return;
  try {
    if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended') audioCtx.resume();
    const now=audioCtx.currentTime;
    const osc=audioCtx.createOscillator();
    const gain=audioCtx.createGain();
    const filter=audioCtx.createBiquadFilter();
    osc.type='sine';
    const freq=kind==='exhale'?260:kind==='hold'?330:390;
    osc.frequency.setValueAtTime(freq, now);
    osc.frequency.exponentialRampToValueAtTime(freq*.86, now+.32);
    filter.type='lowpass';
    filter.frequency.setValueAtTime(700, now);
    gain.gain.setValueAtTime(.0001, now);
    gain.gain.exponentialRampToValueAtTime(vol, now+.035);
    gain.gain.exponentialRampToValueAtTime(.0001, now+.42);
    osc.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
    osc.start(now); osc.stop(now+.45);
  } catch(e) {}
}

function updateVolText() {
  voiceText.textContent=voiceVol.value+'%';
  chimeText.textContent=chimeVol.value+'%';
}

function resetUI() {
  clearTimeout(timer);
  stopAll();
  stopGuideAudio();
  running=false;
  testing=false;
  circle.className='circle';
  phaseEl.textContent='준비';
  countEl.textContent=' ';
  hintEl.textContent='소리만 따라가';
  roundText.textContent='0 / '+totalRounds+'회';
  stepText.textContent='대기 중';
  fill.style.width='0%';
  startBtn.textContent='시작';
  testBtn.textContent='음성 테스트';
}


async function transitionGap(label) {
  if(!running) return;
  circle.className='circle';
  phaseEl.textContent='잠깐';
  countEl.textContent='·';
  hintEl.textContent=label;
  stepText.textContent='짧은 공백';
  await sleep(420);
}

async function runStep(step, round, idx) {
  circle.className='circle '+step.key;
  phaseEl.textContent=step.label;
  hintEl.textContent=step.hint;
  stepText.textContent=step.label+' '+step.seconds+'초';
  roundText.textContent=round+' / '+totalRounds+'회';
  softChime(step.key);
  await sleep(180);

  for(let i=1;i<=step.seconds;i++) {
    if(!running) return;
    countEl.textContent=dots(i);
    playNum(i);
    const done=(round-1)*12 + pattern.slice(0,idx).reduce((s,x)=>s+x.seconds,0) + (i-1);
    fill.style.width=Math.min(100,done/(totalRounds*12)*100)+'%';
    await sleep(countMs);
  }
}

async function restPause(round) {
  if(!running) return;
  for(let j=1;j<=2;j++) {
    if(!running) return;
    circle.className='circle';
    phaseEl.textContent='잠깐 쉬어';
    countEl.textContent=j===1?'·':'· ·';
    hintEl.textContent='내쉰 뒤 바로 들이마시지 말고 짧게 쉬어.';
    stepText.textContent='짧은 쉼 '+j+'/2';
    roundText.textContent=round+' / '+totalRounds+'회';
    await sleep(pauseMs);
  }
}

async function start() {
  if(running) return;
  testing=false;
  running=true;
  startBtn.textContent='진행 중';
  circle.className='circle';
  phaseEl.textContent='안내';
  countEl.textContent='·';
  hintEl.textContent='4-2-6 호흡 안내를 들은 뒤 시작해.';
  stepText.textContent='시작 안내';
  await playGuideAudio(introAudio);
  if(!running) return;

  for(let r=1;r<=totalRounds;r++) {
    for(let i=0;i<pattern.length;i++) {
      if(!running) return;
      await runStep(pattern[i],r,i);
      if(pattern[i].key === 'inhale') {
        await transitionGap('들이마신 뒤 바로 멈추지 말고 아주 짧게 쉬어.');
      }
      if(pattern[i].key === 'hold') {
        await transitionGap('멈춘 뒤 바로 내쉬지 말고 아주 짧게 쉬어.');
      }
      await sleep(80);
    }
    if(r<totalRounds) await restPause(r);
  }

  fill.style.width='100%';
  circle.className='circle';
  phaseEl.textContent='완료';
  countEl.textContent='· · ·';
  hintEl.textContent='수고하셨습니다. 편안한 하루 되세요.';
  stepText.textContent='완료';
  await playGuideAudio(outroAudio);
  running=false;
  startBtn.textContent='다시 시작';
}

async function testVoice() {
  if(testing) return;
  testing=true;
  testBtn.textContent='테스트 중';
  stopAll();

  for(let i=1;i<=4;i++) {
    if(!testing) return;
    phaseEl.textContent='테스트';
    countEl.textContent=dots(i);
    playNum(i);
    await sleep(760);
  }

  testing=false;
  testBtn.textContent='음성 테스트';
}


settingsToggle.addEventListener('click', ()=>{
  settingsPanel.classList.toggle('open');
  const opened=settingsPanel.classList.contains('open');
  settingsToggle.textContent=opened?'▲':'▼';
  settingsToggle.setAttribute('aria-label', opened?'설정 닫기':'설정 열기');
});

roundBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    if(running) return;
    totalRounds=Number(btn.dataset.rounds);
    roundBtns.forEach(b=>b.classList.toggle('active', b===btn));
    roundText.textContent='0 / '+totalRounds+'회';
    fill.style.width='0%';
  });
});

voiceVol.addEventListener('input', updateVolText);
chimeVol.addEventListener('input', updateVolText);
testBtn.addEventListener('click', testVoice);
startBtn.addEventListener('click', start);
stopBtn.addEventListener('click', resetUI);
chimeToggleBtn.addEventListener('click', ()=>{
  chimeOn=!chimeOn;
  chimeToggleBtn.textContent=chimeOn?'종소리 켜짐':'종소리 꺼짐';
  if(chimeOn) softChime();
});

updateVolText();
resetUI();
</script>
